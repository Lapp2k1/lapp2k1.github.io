<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Spine Viewer - Final Fix</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #222; padding: 20px; border-radius: 10px; display: inline-block; border: 1px solid #444; }
        #status { color: #ffcc00; margin: 15px; font-family: monospace; }
        #player-container { width: 800px; height: 600px; background: #000; margin: 20px auto; border: 2px solid #333; }
        .input-group { margin: 10px 0; text-align: left; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/spine-player/3.8.99/spine-player.min.css">
</head>
<body>

    <div class="box">
        <h3>Spine Viewer (Deep Scan Loader)</h3>
        <div id="status">Đang tìm bộ giải mã Spine...</div>
        <div class="input-group">Skel: <input type="file" id="skel"></div>
        <div class="input-group">Atlas: <input type="file" id="atlas"></div>
        <div class="input-group">PNG: <input type="file" id="png"></div>
        <button id="btn" disabled>Chờ thư viện...</button>
    </div>

    <div id="player-container">
        <div id="spine-player" style="width: 100%; height: 100%;"></div>
    </div>

    <script>
        const sources = [
            "https://unpkg.com/@esotericsoftware/spine-player@3.8.99/dist/spine-player.js",
            "https://cdn.jsdelivr.net/npm/@esotericsoftware/spine-player@3.8.99/dist/spine-player.js",
            "https://cdnjs.cloudflare.com/ajax/libs/spine-player/3.8.99/spine-player.min.js"
        ];
        let currentSource = 0;

        function loadScript(idx) {
            if (idx >= sources.length) {
                document.getElementById('status').innerHTML = "❌ KHÔNG THỂ TẢI THƯ VIỆN.<br>Vui lòng bật VPN (1.1.1.1) hoặc kiểm tra chặn quảng cáo.";
                document.getElementById('status').style.color = "red";
                return;
            }

            const script = document.createElement('script');
            script.src = sources[idx];
            script.onload = () => {
                document.getElementById('status').innerText = "✅ Đã nạp thư viện thành công!";
                document.getElementById('status').style.color = "lightgreen";
                document.getElementById('btn').disabled = false;
            };
            script.onerror = () => {
                console.log("Lỗi nguồn " + (idx + 1) + ", thử nguồn tiếp theo...");
                loadScript(idx + 1);
            };
            document.head.appendChild(script);
        }

        loadScript(0);

        document.getElementById('btn').onclick = function() {
            const skelFile = document.getElementById('skel').files[0];
            const atlasFile = document.getElementById('atlas').files[0];
            const pngFile = document.getElementById('png').files[0];

            if(!skelFile || !atlasFile || !pngFile) return alert("Thiếu file!");

            document.getElementById('spine-player').innerHTML = '';
            new spine.SpinePlayer("spine-player", {
                skelUrl: URL.createObjectURL(skelFile),
                atlasUrl: URL.createObjectURL(atlasFile),
                rawDataURIs: { [pngFile.name]: URL.createObjectURL(pngFile) },
                alpha: true,
                showControls: true
            });
        };
    </script>
</body>
</html>
